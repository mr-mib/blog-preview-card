<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="blogCard">
      <header class="blogCard__header">
        <figure class="blogCard__header-img">
          <img
            src="./assets/images/illustration-article.svg"
            alt="cover image of the article about HTML & CSS foundations"
            class="blogCard__image"
          />
          <figcaption>
            <span class="blogCard__category">Learning</span>
          </figcaption>
        </figure>
        <time datetime="2023-12-21" class="blogCard__date"
          >Published 21 Dec 2023</time
        >
      </header>

      <h1 class="blogCard__title">HTML & CSS foundations</h1>

      <p class="blogCard__description">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>

      <footer class="blogCard__author">
        <img
          src="./assets/images/image-avatar.webp"
          alt="Avatar of the blogs author"
          class="blogCard__author-avatar"
        />
        <span class="blogCard__author-name">Greg Hooper</span>
      </footer>
    </main>

    <footer class="blogCard__footer">
      <p class="blogCard__footer-text">
        Challenge by
        <a
          class="blogCard__footer-link"
          href="https://www.frontendmentor.io?ref=challenge"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="blogCard__footer-link"
          href="https://github.com/mr-mib/QR-code-component"
          >mr-mib</a
        >.
      </p>
    </footer>
  </body>
</html>
